<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Placeholder Text Filler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Placeholder Text Filler</h1>

    <div class="dropdown-container">
        <select id="promptDropdown" class="prompt-dropdown">
            <option value="">-- Select a template --</option>
        </select>
        <button class="load-btn" onclick="loadSelectedPrompt()">Load</button>
    </div>

    <textarea id="promptTemplate" placeholder="e.g., 'Write a {{}} story about a {{}} who discovers {{}} and then {{}}.'">Write a {{}} story about a {{}} who discovers {{}} and then {{}}.</textarea>

    <div class="stats-badge" id="statsBadge">
        <span class="stat-item">placeholders <span class="stat-value" id="placeholderCount">0</span></span>
        <span class="stat-item">inputs <span class="stat-value" id="inputCount">0</span></span>
    </div>

    <div class="inputs-container" id="inputsContainer">
    </div>

    <div class="button-panel">
        <button onclick="addInputField()">Add input</button>
        <button onclick="syncInputsToTemplate()">Sync with template</button>
        <button onclick="generatePrompt()" style="background:#2c4056; border-color:#5f83a3;">Generate prompt</button>
    </div>

    <div class="output-section" id="outputResult">
        <div class="output-header">
            <span class="output-label">generated output</span>
        </div>
        <div class="output-content" id="outputText">
            Your filled prompt will appear here...
        </div>
    </div>

    <footer>each {{}} replaced in order</footer>
</div>

<script src="script.js"></script>
</body>
</html>
